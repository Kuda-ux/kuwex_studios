[build]
  command = "npm run build"
  publish = ".next"

# Use the official Next.js plugin for proper SSR/ISR/routing
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Disable Netlify's default Pretty URLs to prevent trailing slash conflicts
# (Next.js handles trailing slash via trailingSlash: false in next.config.mjs)
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# Custom headers for static assets and ads.txt
[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect www to non-www (prevent duplicate content)
[[redirects]]
  from = "https://www.kuwexstudios.co.zw/*"
  to = "https://kuwexstudios.co.zw/:splat"
  status = 301
  force = true
